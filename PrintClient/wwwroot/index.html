<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Server</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #16a34a;
            --error: #dc2626;
            --warn: #d97706;
            --bg: #f1f5f9;
            --card: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --muted: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 2rem 1rem;
        }
        .container { max-width: 640px; margin: 0 auto; }
        h1 { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
        .doli-logo { height: 28px; width: auto; display: block; }
        .h1-sep { width: 1px; height: 24px; background: var(--border); }
        .h1-label { font-size: 1.1rem; font-weight: 700; color: var(--text); }
        h2 {
            font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.08em; color: var(--muted); margin-bottom: 1rem;
        }
        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; padding: 1.5rem; margin-bottom: 1.25rem;
        }
        .card-header {
            display: flex; align-items: center;
            justify-content: space-between; margin-bottom: 1rem;
        }
        .card-header h2 { margin-bottom: 0; }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
        .stat label { font-size: 0.75rem; color: var(--muted); display: block; margin-bottom: 0.2rem; }
        .stat .val { font-size: 1rem; font-weight: 600; }

        /* Badges */
        .badge {
            display: inline-flex; align-items: center; gap: 0.4rem;
            font-size: 0.78rem; font-weight: 600;
            padding: 0.2rem 0.6rem; border-radius: 999px;
        }
        .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
        .badge.ok    { background: #dcfce7; color: var(--success); }
        .badge.ok::before    { background: var(--success); }
        .badge.err   { background: #fee2e2; color: var(--error); }
        .badge.err::before   { background: var(--error); }
        .badge.warn  { background: #fef3c7; color: var(--warn); }
        .badge.warn::before  { background: var(--warn); }
        .badge.muted { background: var(--bg); color: var(--muted); }
        .badge.muted::before { background: var(--muted); }

        .count-badge {
            font-size: 0.75rem; font-weight: 700;
            background: var(--primary); color: white;
            border-radius: 999px; padding: 0.15rem 0.55rem; display: none;
        }
        .count-badge.visible { display: inline-block; }

        #lastMsg { font-size: 0.82rem; color: var(--muted); margin-top: 0.5rem; min-height: 1.2em; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        th {
            text-align: left; font-size: 0.7rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.06em;
            color: var(--muted); padding: 0 0 0.6rem; border-bottom: 1px solid var(--border);
        }
        td { padding: 0.55rem 0; border-bottom: 1px solid var(--border); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        .td-file { font-family: monospace; font-size: 0.8rem; word-break: break-all; }
        .td-name { font-weight: 600; font-size: 0.875rem; }
        .empty-table { font-size: 0.875rem; color: var(--muted); text-align: center; padding: 1rem 0; }

        /* Forms */
        form { display: flex; flex-direction: column; gap: 1rem; }
        .field { display: flex; flex-direction: column; gap: 0.35rem; }
        .field label { font-size: 0.875rem; font-weight: 500; }
        .field input {
            border: 1px solid var(--border); border-radius: 6px;
            padding: 0.5rem 0.75rem; font-size: 0.9rem; outline: none;
            transition: border-color 0.15s, box-shadow 0.15s; width: 100%;
        }
        .field input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
        }
        .input-row { display: flex; gap: 0.5rem; align-items: center; }
        .input-row input { flex: 1; }
        .row { display: flex; gap: 0.75rem; align-items: center; margin-top: 0.25rem; }

        /* Buttons */
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 0.55rem 1.1rem; border-radius: 6px;
            font-size: 0.875rem; font-weight: 600; cursor: pointer;
            border: none; transition: background 0.15s, opacity 0.15s; white-space: nowrap;
        }
        .btn:active { opacity: 0.85; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
        .btn-ghost:hover { background: var(--bg); }
        .btn-icon { padding: 0.5rem 0.65rem; font-size: 1rem; line-height: 1; }

        .flash {
            font-size: 0.82rem; opacity: 0; transition: opacity 0.3s;
        }
        .flash.ok  { color: var(--success); }
        .flash.err { color: var(--error); }
        .flash.show { opacity: 1; }
    </style>
</head>
<body>
<div class="container">
    <h1>
        <img src="/dolibarr_logo.svg" class="doli-logo" alt="Dolibarr">
        <span class="h1-sep"></span>
        <span class="h1-label">Print Server</span>
    </h1>

    <!-- Statut du service -->
    <div class="card">
        <h2>Statut</h2>
        <div class="status-grid">
            <div class="stat">
                <label>Service</label>
                <span id="badge" class="badge ok">En cours</span>
            </div>
            <div class="stat">
                <label>Dernier sondage</label>
                <span id="lastPoll" class="val">—</span>
            </div>
            <div class="stat">
                <label>Taches reussies</label>
                <span id="jobsOk" class="val">—</span>
            </div>
            <div class="stat">
                <label>Taches en erreur</label>
                <span id="jobsErr" class="val">—</span>
            </div>
        </div>
        <div id="lastMsg"></div>
    </div>

    <!-- File d'impression -->
    <div class="card">
        <div class="card-header">
            <h2>File d'impression</h2>
            <span id="jobCount" class="count-badge">0</span>
        </div>
        <div id="jobsContainer">
            <div class="empty-table">File vide</div>
        </div>
    </div>

    <!-- Imprimantes CUPS -->
    <div class="card">
        <div class="card-header">
            <h2>Imprimantes</h2>
            <div class="row" style="margin-top:0">
                <button class="btn btn-ghost btn-icon" onclick="loadPrinters()" title="Actualiser">&#8635;</button>
                <button class="btn btn-ghost" onclick="syncPrinters()">Sync vers Dolibarr</button>
                <span id="syncMsg" class="flash ok">Synchronise</span>
            </div>
        </div>
        <div id="printersContainer">
            <div class="empty-table">Chargement...</div>
        </div>
        <datalist id="printerList"></datalist>
    </div>

    <!-- Configuration -->
    <div class="card">
        <h2>Configuration</h2>
        <form id="configForm">
            <div class="field">
                <label for="apiUrl">URL API Dolibarr</label>
                <input id="apiUrl" type="url" placeholder="http://host.docker.internal/api/index.php" required>
            </div>
            <div class="field">
                <label for="apiKey">Cle API (DOLAPIKEY)</label>
                <input id="apiKey" type="password" placeholder="Votre cle API" required>
            </div>
            <div class="field">
                <label for="printerName">Imprimante par defaut</label>
                <div class="input-row">
                    <input id="printerName" type="text" placeholder="AL-C2800" required list="printerList">
                </div>
            </div>
            <div class="field">
                <label for="pollingInterval">Intervalle de sondage (secondes)</label>
                <input id="pollingInterval" type="number" min="5" max="3600" required>
            </div>
            <div class="row">
                <button type="submit" class="btn btn-primary">Enregistrer</button>
                <button type="button" class="btn btn-ghost" onclick="pollNow()">Sonder maintenant</button>
                <span id="saveMsg" class="flash ok">Enregistre</span>
            </div>
        </form>
    </div>
</div>

<script>
function printerBadge(p) {
    const s = (p.status || '').toLowerCase();
    if (s === 'idle')       return `<span class="badge ok">Disponible</span>`;
    if (s === 'processing') return `<span class="badge warn">En cours</span>`;
    if (s === 'stopped' || s === 'disabled') return `<span class="badge err">Arrete</span>`;
    return `<span class="badge muted">${p.status}</span>`;
}

function acceptingBadge(p) {
    return p.isAccepting
        ? `<span class="badge ok">Accepte</span>`
        : `<span class="badge err">Refuse</span>`;
}

async function loadPrinters() {
    try {
        const res = await fetch('/api/printers');
        const printers = await res.json();

        // Mettre à jour le datalist
        const dl = document.getElementById('printerList');
        dl.innerHTML = printers.map(p => `<option value="${p.name}">`).join('');

        // Mettre à jour le tableau
        renderPrinters(printers);
    } catch {}
}

function renderPrinters(printers) {
    const container = document.getElementById('printersContainer');
    if (!printers || printers.length === 0) {
        container.innerHTML = '<div class="empty-table">Aucune imprimante detectee</div>';
        return;
    }
    container.innerHTML = `
        <table>
            <thead>
                <tr>
                    <th>Nom</th>
                    <th style="width:7rem">Statut</th>
                    <th style="width:6rem">File</th>
                </tr>
            </thead>
            <tbody>
                ${printers.map(p => `
                <tr>
                    <td class="td-name">${p.name}</td>
                    <td>${printerBadge(p)}</td>
                    <td>${acceptingBadge(p)}</td>
                </tr>`).join('')}
            </tbody>
        </table>`;
}

async function syncPrinters() {
    const msg = document.getElementById('syncMsg');
    msg.classList.remove('show', 'ok', 'err');
    try {
        const res = await fetch('/api/printers/sync', { method: 'POST' });
        const printers = await res.json();
        renderPrinters(printers);
        // Mettre à jour le datalist aussi
        const dl = document.getElementById('printerList');
        dl.innerHTML = printers.map(p => `<option value="${p.name}">`).join('');
        msg.textContent = 'Synchronise';
        msg.className = 'flash ok show';
    } catch {
        msg.textContent = 'Erreur';
        msg.className = 'flash err show';
    }
    setTimeout(() => msg.classList.remove('show'), 2500);
}

async function loadConfig() {
    const res = await fetch('/api/config');
    const c = await res.json();
    document.getElementById('apiUrl').value = c.apiUrl ?? '';
    document.getElementById('apiKey').value = c.apiKey ?? '';
    document.getElementById('printerName').value = c.printerName ?? '';
    document.getElementById('pollingInterval').value = c.pollingIntervalSeconds ?? 30;
}

async function refreshStatus() {
    try {
        const res = await fetch('/api/status');
        const s = await res.json();
        document.getElementById('lastPoll').textContent = s.lastPollTime
            ? new Date(s.lastPollTime).toLocaleTimeString('fr-FR') : '—';
        document.getElementById('jobsOk').textContent  = s.jobsProcessed ?? 0;
        document.getElementById('jobsErr').textContent = s.jobsFailed ?? 0;
        document.getElementById('lastMsg').textContent  = s.lastMessage ?? '';
        const badge = document.getElementById('badge');
        badge.className = 'badge ' + (s.isRunning ? 'ok' : 'err');
        badge.textContent = s.isRunning ? 'En cours' : 'Arrete';
    } catch {}
}

async function refreshJobs() {
    try {
        const res = await fetch('/api/jobs');
        const jobs = await res.json();
        const container = document.getElementById('jobsContainer');
        const badge = document.getElementById('jobCount');
        if (!jobs || jobs.length === 0) {
            container.innerHTML = '<div class="empty-table">File vide</div>';
            badge.classList.remove('visible');
            return;
        }
        badge.textContent = jobs.length;
        badge.classList.add('visible');
        container.innerHTML = `
            <table>
                <thead><tr>
                    <th style="width:3rem">ID</th>
                    <th>Fichier</th>
                    <th style="width:5rem">Module</th>
                </tr></thead>
                <tbody>${jobs.map(j => `
                <tr>
                    <td>#${j.id}</td>
                    <td class="td-file">${j.fileName ?? '—'}</td>
                    <td>${j.modulepart ?? '—'}</td>
                </tr>`).join('')}</tbody>
            </table>`;
    } catch {}
}

document.getElementById('configForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const body = {
        apiUrl: document.getElementById('apiUrl').value,
        apiKey: document.getElementById('apiKey').value,
        printerName: document.getElementById('printerName').value,
        pollingIntervalSeconds: parseInt(document.getElementById('pollingInterval').value, 10)
    };
    await fetch('/api/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
    const msg = document.getElementById('saveMsg');
    msg.classList.add('show');
    setTimeout(() => msg.classList.remove('show'), 2500);
});

async function pollNow() {
    await fetch('/api/poll', { method: 'POST' });
}

loadConfig();
loadPrinters();
refreshStatus();
refreshJobs();
setInterval(() => { refreshStatus(); refreshJobs(); }, 5000);
</script>
</body>
</html>
